name: Deploy A+ Documentation

on:
  push:
    branches:
      - sphinxdocs  # or the branch you want to trigger the deployment

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'  # specify your Python version

      - name: Install dependencies
        run: |
          sudo apt-get install libxml2-dev libxslt-dev
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install sphinx sphinx-rtd-theme

      - name: Set environment variables
        run: echo "BASE_URL=http://localhost:8000/" >> $GITHUB_ENV

      - name: Build documentation
        env:
          APLUS_BASE_URL: ${{ env.BASE_URL }}
        run: |
          sphinx-build -b html docs/source docs/build/_build/html

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git clone --depth 1 --branch master https://github.com/sayravai/apluslms.github.io.git master
          rsync -av --delete docs/build/_build/html/ master/code/aplus/
          cd master
          git add .
          git commit -m "Update A+ Sphinx documentation"
          git push origin master